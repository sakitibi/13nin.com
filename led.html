<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Matrix Generator
    </title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #000000;
            --control-bg: #1a1a1a;
            --accent: #0070f3;
        }

        body {
            background-color: var(--bg-color);
            color: #eee;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .matrix-outer {
            background-color: #111;
            padding: 10px;
            border-radius: 4px;
            border: 4px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        /* 128x32のドット感を出すため、CSSで拡大表示する */
        #led-canvas {
            background-color: var(--panel-bg);
            display: block;
            /* 実際の表示サイズ（お好みで調整） */
            width: 1024px; 
            height: 256px;
            image-rendering: pixelated; 
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--control-bg);
            padding: 20px 30px;
            border-radius: 50px;
        }

        input[type="text"] {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            width: 250px;
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>LED MATRIX DISPLAY</h1>

    <div class="matrix-outer">
        <canvas id="led-canvas" width="128" height="32"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="text-input" placeholder="メッセージを入力">
        <input type="color" id="color-picker" value="#ff3300">
        <button id="update-btn">SEND DATA</button>
    </div>

    <script>
        const ROWS = 32;
        const COLS = 128;
        const canvas = document.getElementById('led-canvas');
        const ctx = canvas.getContext('2d');

        function draw(matrix, color) {
            // キャンバスをクリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1ピクセルずつ描画
            matrix.forEach((row, y) => {
                row.forEach((bit, x) => {
                    if (bit === 1) {
                        ctx.fillStyle = color;
                        // 128x32のキャンバス上の1pxとして描画
                        ctx.fillRect(x, y, 1, 1);
                        
                        // 光り輝くエフェクトはCSSのfilter: drop-shadowでやるのが
                        // 128x32環境では一番綺麗で軽いです
                    } else {
                        ctx.fillStyle = '#111';
                        ctx.fillRect(x, y, 1, 1);
                    }
                });
            });
        }

        // CSSで光らせるための設定
        function updateGlow(color) {
            canvas.style.filter = `drop-shadow(0 0 5px ${color})`;
        }

        async function updateDisplay() {
            const text = document.getElementById('text-input').value;
            const color = document.getElementById('color-picker').value;
            const btn = document.getElementById('update-btn');

            btn.disabled = true;

            try {
                const response = await fetch('/api/led', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, color })
                });

                const data = await response.json();
                if (data.matrix) {
                    draw(data.matrix, color);
                    updateGlow(color);
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('update-btn').addEventListener('click', updateDisplay);

        // 初期化
        const empty = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        draw(empty, "#000");
    </script>
</body>
</html>
