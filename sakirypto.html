<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブラウザ暗号ジェネレーター</title>
<style>
body{font-family:sans-serif;margin:20px;background:#f4f4f4}
textarea{width:100%;height:100px;margin:5px 0}
button{margin:5px 0;padding:10px}
.output{white-space:pre-wrap;background:#fff;padding:10px;border:1px solid #ccc;min-height:100px}
</style>
</head>
<body>

<h2>暗号化ジェネレーター + バイナリ/テキスト保存対応</h2>

<label>パスワード:</label>
<input type="text" id="password" value="abc"/>

<label>文字列入力:</label>
<textarea id="inputText">Hello World</textarea>

<button id="encodeBtn">暗号化</button>
<button id="decodeBtn">復号化</button>
<button id="saveBtn">ファイル保存</button>

<h3>出力:</h3>
<div class="output" id="output"></div>

<script type="module">
import upack from 'https://cdn.jsdelivr.net/npm/upack.js@latest/dist/index.js';

const output = document.getElementById("output");
const inputText = document.getElementById("inputText");
const passwordInput = document.getElementById("password");

let lastEncryptedBytes = null;
let lastDecryptedText = null;
let lastAction = null; // "encrypt" or "decrypt"

// ===== Base64 表示 =====
function toBase64(bytes) {
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
}

// ===== 暗号化 =====
document.getElementById("encodeBtn").onclick = async () => {
    try {
        const bytes = await upack.encode(inputText.value, passwordInput.value);
        lastEncryptedBytes = bytes;
        lastAction = "encrypt";
        output.textContent = toBase64(bytes); // 表示は Base64
        lastDecryptedText = null;
    } catch (e) {
        output.textContent = "Error: " + e;
    }
};

// ===== 復号化 =====
document.getElementById("decodeBtn").onclick = async () => {
    try {
        if (!lastEncryptedBytes) return alert("暗号化したデータがありません");
        const text = await upack.decode(lastEncryptedBytes, passwordInput.value);
        lastDecryptedText = text;
        lastAction = "decrypt";
        output.textContent = text; // 表示は平文
    } catch (e) {
        output.textContent = "Error: " + e;
    }
};

// ===== ファイル保存 =====
document.getElementById("saveBtn").onclick = () => {
    if (lastAction === "encrypt") {
        if (!lastEncryptedBytes) return alert("暗号化したデータがありません");
        upack.saveBinaryFile(lastEncryptedBytes, "encrypted.skrpt");
    } else if (lastAction === "decrypt") {
        if (!lastDecryptedText) return alert("復号化したデータがありません");
        const blob = new Blob([lastDecryptedText], {type: "text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "decrypted.txt";
        a.click();
        URL.revokeObjectURL(url);
    } else {
        alert("保存するデータがありません");
    }
};
</script>
</body>
</html>
