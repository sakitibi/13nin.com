<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNR2 Skill Config Console</title>
    <style>
        :root { --accent: #673AB7; --success: #4CAF50; --bg: #f5f5f7; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8em; }
        p { color: #666; font-size: 0.9em; }

        /* 認証セクション */
        .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #ede7f6; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #d1c4e9; }
        .field label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; color: #4527a0; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        input:focus { outline: none; border-color: var(--accent); ring: 2px var(--accent); }

        /* スキル入力エリア */
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .skill-card { background: #fff; border: 1px solid #eaeaea; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .skill-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(103, 58, 183, 0.1); }
        .skill-info { flex: 1; }
        .skill-name { font-weight: bold; font-size: 0.85em; color: #555; display: block; margin-bottom: 2px; }
        .skill-input-wrapper { width: 80px; }
        .skill-input-wrapper input { text-align: center; background: #fafafa; }

        /* アクションボタン */
        .footer-actions { margin-top: 40px; display: flex; gap: 15px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; }
        .btn-update { background: var(--accent); }
        .btn-create { background: var(--success); }
        button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* ログ出力 */
        #status-log { margin-top: 25px; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; display: none; font-size: 0.85em; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Skill Cooltime Manager</h1>
        <p>SNR2 スキルクールタイム一括設定</p>
    </header>

    <div class="auth-grid">
        <div class="field">
            <label>設定ID (config_id / UUID)</label>
            <input type="text" id="config_id" placeholder="サーバーで指定するUUID">
        </div>
        <div class="field">
            <label>管理者UUID (admin_id)</label>
            <input type="password" id="admin_id" placeholder="本人確認用UUID">
        </div>
    </div>

    <div class="skill-grid" id="skill-list">
        </div>

    <div class="footer-actions">
        <button class="btn-update" onclick="handleRequest('PUT')">既存設定を更新 (PUT)</button>
        <button class="btn-create" onclick="handleRequest('POST')">新規作成 (POST)</button>
    </div>

    <div id="status-log"></div>
</div>

<script>
    // デフォルト値の定義
    const SKILL_DEFAULTS = {
        "JINROU_SLASH": 1,
        "MAGICAL_GIRL_SLOW": 1,
        "MAGICAL_GIRL_POISON": 1,
        "MAGICAL_GIRL_FLY": 1,
        "WANASHI_TRAP": 1,
        "CRAB_BUBBLE": 1,
        "CRACKER_CRACK": 1,
        "TELEPORTER_TELEPORT": 1,
        "URANAI_FORTUNE": 2,
        "REINOU_REINOU": 1,
        "HOANKAN_HUNTING": 1,
        "KISHI_GUARD": 1,
        "MAGICAL_BOY_SIGHT": 2,
        "MAGICAL_BOY_FLY": 1,
        "MAGICAL_BOY_TREATMENT": 1,
        "NICETELEPORTER_TELEPORT": 1,
        "SHINIGAMI_POSSESS": 1,
        "CUPID_ARROW": 1
    };

    // 入力欄の生成
    const skillListContainer = document.getElementById('skill-list');
    Object.keys(SKILL_DEFAULTS).forEach(key => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
            <div class="skill-info">
                <span class="skill-name">${key}</span>
            </div>
            <div class="skill-input-wrapper">
                <input type="number" id="input-${key}" value="${SKILL_DEFAULTS[key]}" min="0">
            </div>
        `;
        skillListContainer.appendChild(card);
    });

    // リクエスト処理
    async function handleRequest(method) {
        const log = document.getElementById('status-log');
        const configId = document.getElementById('config_id').value;
        const adminId = document.getElementById('admin_id').value;

        if (!configId || !adminId) {
            alert("IDと管理者UUIDを入力してください。");
            return;
        }

        // データの集計
        const configData = {};
        Object.keys(SKILL_DEFAULTS).forEach(key => {
            configData[key] = parseInt(document.getElementById(`input-${key}`).value) || 0;
        });

        const payload = {
            config_id: configId,
            admin_id: adminId,
            config: configData
        };

        log.style.display = 'block';
        log.className = 'loading';
        log.style.background = '#eee';
        log.innerText = `[${method}] 通信中...`;

        try {
            const response = await fetch('https://asakura-wiki.vercel.app/api/snr2/skill_config', {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-id': adminId
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            log.className = '';
            
            if (response.ok) {
                log.style.background = '#d4edda';
                log.style.color = '#155724';
                log.innerText = `成功: ${method === 'PUT' ? '更新' : '作成'}が完了しました。\n${JSON.stringify(result, null, 2)}`;
            } else {
                log.style.background = '#f8d7da';
                log.style.color = '#721c24';
                log.innerText = `エラー (${response.status}): ${result.error || '不明なエラー'}`;
            }
        } catch (err) {
            log.className = '';
            log.style.background = '#f8d7da';
            log.innerText = `通信失敗: ${err.message}`;
        }
    }
</script>

</body>
</html>
