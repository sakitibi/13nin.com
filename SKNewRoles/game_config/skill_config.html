<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKNewRoles2 スキル設定コンソール</title>
    <style>
        :root { --accent: #673AB7; --success: #4CAF50; --bg: #f5f5f7; --card: #ffffff; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8em; }
        p { color: #666; font-size: 0.9em; margin-top: 5px; }

        .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #ede7f6; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #d1c4e9; }
        .field label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; color: #4527a0; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; }

        /* スキルリストのスタイル */
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .skill-card { background: #fff; border: 1px solid #eaeaea; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .skill-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(103, 58, 183, 0.1); }
        .skill-name-jp { font-weight: bold; font-size: 1em; color: #333; display: block; }
        .skill-name-en { font-size: 0.7em; color: #999; display: block; font-family: monospace; }
        .skill-input-wrapper { width: 80px; }
        .skill-input-wrapper input { text-align: center; font-weight: bold; color: var(--accent); }

        .footer-actions { margin-top: 40px; display: flex; gap: 15px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; }
        .btn-update { background: var(--accent); }
        .btn-create { background: var(--success); }

        #status-log { margin-top: 25px; padding: 15px; border-radius: 8px; font-family: monospace; display: none; font-size: 0.85em; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SKNewRolesスキル設定管理</h1>
        <p>スキルのクールタイムを設定できます</p>
    </header>

    <div class="auth-grid">
        <div class="field">
            <label>構成UUID (config_id)</label>
            <input type="text" id="config_id" placeholder="事前にUUIDを生成して下さい">
        </div>
        <div class="field">
            <label>管理者UUID (admin_id)</label>
            <input type="password" id="admin_id" placeholder="あなたのUUIDを入力">
        </div>
    </div>

    <div class="skill-grid" id="skill-list"></div>

    <div class="footer-actions">
        <button class="btn-update" onclick="handleRequest('PUT')">設定を更新 (PUT)</button>
        <button class="btn-create" onclick="handleRequest('POST')">新規保存 (POST)</button>
    </div>

    <div id="status-log"></div>
</div>

<script>
    // キーと日本語名のマッピング
    const SKILL_MAP = {
        "JINROU_SLASH": { name: "人狼: 切り裂く", default: 1 },
        "MAGICAL_GIRL_SLOW": { name: "魔法少女: 鈍足魔法", default: 1 },
        "MAGICAL_GIRL_POISON": { name: "魔法少女: 毒魔法", default: 1 },
        "MAGICAL_GIRL_FLY": { name: "魔法少女: 飛行魔法", default: 1 },
        "WANASHI_TRAP": { name: "罠師: 罠設置", default: 1 },
        "CRAB_BUBBLE": { name: "かに: かに化", default: 1 },
        "CRACKER_CRACK": { name: "クラッカー: クラック", default: 1 },
        "TELEPORTER_TELEPORT": { name: "テレポーター: テレポート", default: 1 },
        "URANAI_FORTUNE": { name: "占い師: 占い", default: 2 },
        "REINOU_REINOU": { name: "霊能者: 霊能", default: 1 },
        "HOANKAN_HUNTING": { name: "シェリフ: 正義執行", default: 1 },
        "KISHI_GUARD": { name: "騎士: 守護", default: 1 },
        "MAGICAL_BOY_SIGHT": { name: "魔法少年: 見通し魔法", default: 2 },
        "MAGICAL_BOY_FLY": { name: "魔法少年: 飛行魔法", default: 1 },
        "MAGICAL_BOY_TREATMENT": { name: "魔法少年: 治癒魔法", default: 1 },
        "NICETELEPORTER_TELEPORT": { name: "ナイステレポーター: テレポート", default: 1 },
        "SHINIGAMI_POSSESS": { name: "死神: 憑依", default: 1 },
        "CUPID_ARROW": { name: "キューピッド: 愛の矢", default: 1 }
    };

    const skillListContainer = document.getElementById('skill-list');

    // 日本語表示用のカード生成
    Object.keys(SKILL_MAP).forEach(key => {
        const item = SKILL_MAP[key];
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
            <div class="skill-info">
                <span class="skill-name-jp">${item.name}</span>
                <span class="skill-name-en">${key}</span>
            </div>
            <div class="skill-input-wrapper">
                <input type="number" id="input-${key}" value="${item.default}" min="0">
            </div>
        `;
        skillListContainer.appendChild(card);
    });

    async function handleRequest(method) {
        const log = document.getElementById('status-log');
        const configId = document.getElementById('config_id').value;
        const adminId = document.getElementById('admin_id').value;

        if (!configId || !adminId) {
            alert("IDと管理者UUIDを入力してください。");
            return;
        }

        const configData = {};
        Object.keys(SKILL_MAP).forEach(key => {
            configData[key] = parseInt(document.getElementById(`input-${key}`).value) || 0;
        });

        log.style.display = 'block';
        log.style.background = '#eee';
        log.innerText = "通信中...";

        try {
            const response = await fetch('https://asakura-wiki.vercel.app/api/snr2/skill_config', {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-id': adminId
                },
                body: JSON.stringify({
                    config_id: configId,
                    admin_id: adminId,
                    config: configData
                })
            });

            const result = await response.json();
            if (response.ok) {
                log.style.background = '#d4edda';
                log.innerText = `成功: 設定を${method === 'PUT' ? '更新' : '作成'}しました。`;
            } else {
                log.style.background = '#f8d7da';
                log.innerText = `エラー: ${result.error || '失敗しました'}`;
            }
        } catch (err) {
            log.style.background = '#f8d7da';
            log.innerText = "通信失敗: " + err.message;
        }
    }
</script>

</body>
</html>
