    <script>
        // ダッシュボード固有の簡易処理
        document.addEventListener("DOMContentLoaded", () => {
            // ローカルストレージなどから最後に使ったIDを表示する例
            const lastId = localStorage.getItem("last_config_id") || "未適用";
            document.getElementById("last-config-id").innerText = lastId;
            const admin_id = new URL(location.href).searchParams.get("admin_id");
            if (admin_id) {
                if (admin_id.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i)) {
                    localStorage.setItem("admin_id", admin_id);
                }
            }
            const config_id = new URL(location.href).searchParams.get("config_id");
            if (config_id) {
                if (config_id.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i)) {
                    localStorage.setItem("config_id", config_id);
                }
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                .then((registration) => {
                    console.log('Service Worker registered successfully:', registration.scope);
                })
                .catch((error) => {
                    console.log('Service Worker registration failed:', error);
                });
            });
        }
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            // ブラウザ標準のバナーを出さないようにする
            e.preventDefault();
            // イベントを変数に保存
            deferredPrompt = e;
            // 自作のインストールボタンを表示する
            document.getElementById('install-btn').style.display = 'block';
        });
        document.addEventListener("DOMContentLoaded", function(){
            setTimeout(() => {
                const installBtn = document.getElementById('install-btn');
                if (window.matchMedia('(display-mode: standalone)').matches) {
                    installBtn.remove();
                } else {
                    installBtn.addEventListener('click', (e) => {
                        if (deferredPrompt) {
                            // インストール画面を表示
                            deferredPrompt.prompt();
                            // 使い終わった変数をクリア
                            deferredPrompt = null;
                        }
                    });
                }
            }, 100);
        });
    </script>
