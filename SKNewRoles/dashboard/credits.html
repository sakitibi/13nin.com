<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Credits | SKNewRoles Admin</title>
    <link rel="stylesheet" href="/static.asakurawiki.com/css/fontawesomepro.static.css">
    <link rel="stylesheet" href="/13nin.com/css/snr_dashboard/nav.min.css">
    <link rel="stylesheet" href="../../css/snr_dashboard/credits.min.css">
</head>
<body>
    <sknewroles-contents id="content">
        <nav id="common-nav"></nav>
        <div class="credits-viewport">
            <div id="credits">
                Loading Credits...
            </div>
        </div>
    </sknewroles-contents>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="/13nin.com/js/snr_dashboard/nav.js"></script>
    <script>
        /* --- JavaScript 処理 --- */
        async function initCredits() {
            const container = document.getElementById('credits');

            try {
                // 1. 外部ファイルの読み込み
                const response = await fetch('credits.txt.gz');
                if (!response.ok) throw new Error('File not found');
                const buffer = await response.arrayBuffer();
                const text = pako.ungzip(buffer, { to: "string" });
                // 2. コンテンツの生成
                container.innerHTML = ''; // ローディング文字を消去
                const lines = text.split('\n');

                lines.forEach(line => {
                    let trimmed = line.trim();
                    const div = document.createElement('div');
                    if (trimmed.startsWith("§a")) {
                        div.classList.add("lime");
                    } else if (trimmed.startsWith("§f")) {
                        div.classList.add("white");
                    } else if (trimmed.startsWith("§6")) {
                        div.classList.add("orange");
                    } else if (trimmed.startsWith("§e")) {
                        div.classList.add("yellow");
                    } else if (trimmed.startsWith("§b")) {
                        div.classList.add("cyan");
                    } else if (trimmed.startsWith("§7")) {
                        div.classList.add("gray");
                    }
                    trimmed = trimmed.replace(/§[a|f|6|e|b|7|l]/g, "");
                    if (trimmed === "") {
                        div.classList.add('spacer');
                    } else if (!trimmed.startsWith("[")) {
                        div.classList.add('role-title');
                        div.textContent = trimmed;
                    } else {
                        // それ以外は「名前」として扱う
                        div.classList.add('name-item');
                        div.textContent = trimmed;
                    }
                    container.appendChild(div);
                });

                // 3. アニメーションの設定
                const viewportHeight = window.innerHeight;
                const contentHeight = container.offsetHeight;
                
                // 終了位置を計算（コンテナが完全に画面の上へ消えるまで）
                const distance = -(contentHeight + viewportHeight);
                container.style.setProperty('--scroll-distance', `${distance}px`);

                // 速度調整（高さに応じて秒数を変える。100pxあたり1.5秒計算）
                const duration = (contentHeight + viewportHeight) / 70;
                container.style.animation = `scroll-up ${duration}s linear forwards`;

            } catch (error) {
                console.error(error);
                container.textContent = "Error: credits.txt.gz を読み込めませんでした。";
            }
        }

        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', initCredits);
    </script>
    <script src="https://sakitibi.github.io/NMNGyuri-hihan-api/nmngyuri-popup.js"></script>
</body>
</html>
